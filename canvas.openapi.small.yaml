          example: 260
        html_url:
          type: string
          description: The URL to the Canvas web UI page for this course enrollment.
          example: https://...
        grades:
          "$ref": "#/components/schemas/Grade"
        user:
          "$ref": "#/components/schemas/User"
        override_grade:
          type: string
          description: The user's override grade for the course.
          example: A
        override_score:
          type: number
          description: The user's override score for the course.
          example: 99.99
        unposted_current_grade:
          type: string
          description: The user's current grade in the class including muted/unposted
