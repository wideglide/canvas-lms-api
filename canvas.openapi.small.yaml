        updated_at:
          type: string
          format: date-time
          description: The updated time of the enrollment, in ISO8601 format.
          example: '2012-04-18T23:08:51Z'
        start_at:
          type: string
          format: date-time
          description: The start time of the enrollment, in ISO8601 format.
          example: '2012-04-18T23:08:51Z'
        end_at:
          type: string
          format: date-time
          description: The end time of the enrollment, in ISO8601 format.
          example: '2012-04-18T23:08:51Z'
        last_activity_at:
          type: string
          format: date-time
          description: The last activity time of the user for the enrollment, in ISO8601
            format.
          example: '2012-04-18T23:08:51Z'
        last_attended_at:
          type: string
          format: date-time
          description: The last attended date of the user for the enrollment in a
