            (applies only to student enrollments, and only available in course endpoints)'
          example: 95.8
        current_period_unposted_final_score:
          type: number
          description: 'optional: The student''s score in the course for the current
            grading period, including muted/unposted assignments and including ungraded
            assignments with a score of 0. Only included if user has permission to
            view this score, typically teachers, TAs, and admins. If the course the
